name: 'project_dnb'
version: '1.0.0'

profile: 'project_dnb'

model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

clean-targets:         # directories to be removed by `dbt clean`
  - "target"
  - "dbt_packages"


models:
  project_dnb:

    bronze:
      +materialized: table
      +schema: bronze

    copper:
      +materialized: view
      +schema: copper

    silver:
      +materialized: table
      +schema: silver

    super_silver:
      +materialized: view
      +schema: super_silver

    gold:
      +materialized: table
      +schema: gold
